openapi: 3.1.0
info:
  title: ADD-Native App API
  description: |
    Reference OpenAPI specification for an ADD-native (Agent Driven Development) application.
    This defines the standard endpoints that all ADD-native apps MUST or SHOULD implement.

    Authentication is HTTP Message Signatures (RFC 9421) under the Web Bot Auth profile.
    Every authenticated request includes `Signature-Agent`, `Signature-Input`, and `Signature` headers.
    See spec/auth.md for the full signing procedure.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

paths:
  /.well-known/add.json:
    get:
      operationId: getDiscoveryManifest
      summary: Discovery manifest
      description: Returns the ADD discovery manifest for this application.
      tags: [Discovery]
      responses:
        '200':
          description: ADD manifest
          content:
            application/json:
              schema:
                $ref: '../schemas/add-manifest.schema.json'

  /.well-known/http-message-signatures-directory:
    get:
      operationId: getKeyDirectory
      summary: Platform key directory
      description: |
        JWK Set containing the platform's Ed25519 public keys. Agents fetch this to
        verify platform-signed webhooks. Agents publish an equivalent endpoint on
        their own FQDN to expose their public keys for server verification.
      tags: [Discovery]
      responses:
        '200':
          description: JWK Set
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      required: [kty, crv, x, kid]
                      properties:
                        kty: { const: OKP }
                        crv: { const: Ed25519 }
                        x:   { type: string, description: base64url public key }
                        kid: { type: string, description: JWK Thumbprint (RFC 7638) }

  /api/auth/signup:
    post:
      operationId: signup
      summary: Create a new agent account
      description: |
        Register a new agent account. The request MUST be signed per RFC 9421 / Web Bot Auth.
        The request signature is the proof-of-possession; there is no separate keyProof field.

        If the agent cannot host a key directory at its own FQDN, it MAY include `publicKey`
        (JWK) in the body; the server registers that key directly and skips the directory fetch.
      tags: [Auth]
      security:
        - webBotAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, entityType]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 30
                entityType:
                  type: string
                  enum: [agent, human]
                displayName:
                  type: string
                inboxUrl:
                  type: string
                  format: uri
                  description: Webhook URL for notifications (agents only).
                publicKey:
                  type: object
                  description: |
                    Optional JWK for agents that cannot host a key directory. If omitted,
                    the server fetches the agent's directory at
                    `<Signature-Agent>/.well-known/http-message-signatures-directory`.
                  required: [kty, crv, x]
                  properties:
                    kty: { const: OKP }
                    crv: { const: Ed25519 }
                    x:   { type: string }
                    kid: { type: string }
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                  ui:
                    $ref: '../schemas/ui-block.schema.json'
        '400':
          description: Invalid request (missing or malformed signature headers)
          content:
            application/json:
              schema:
                $ref: '../schemas/error-response.schema.json'
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '../schemas/error-response.schema.json'
        '409':
          description: Username taken
          content:
            application/json:
              schema:
                $ref: '../schemas/error-response.schema.json'

  /api/auth/session:
    post:
      operationId: createSession
      summary: Mint an opportunistic Bearer token (optional)
      description: |
        Optional. Servers MAY support this endpoint for high-frequency clients that
        prefer Bearer tokens over per-request signing. Send a signed (Web Bot Auth)
        empty POST; the server returns a short-lived (TTL <= 1h) token bound to the
        `(signature-agent, keyid)` pair. Per-request signing remains canonical.
      tags: [Auth]
      security:
        - webBotAuth: []
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:    { type: string }
                      expires:  { type: integer, description: Unix timestamp }
                  ui:
                    $ref: '../schemas/ui-block.schema.json'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/me:
    get:
      operationId: getProfile
      summary: Get current user profile
      tags: [Profile]
      security:
        - webBotAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                  ui:
                    $ref: '../schemas/ui-block.schema.json'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateProfile
      summary: Update current user profile
      description: |
        Update profile fields including inboxUrl. To rotate keys, update your JWK
        directory (the server picks up new keys automatically). Agents that registered
        an explicit `publicKey` at signup rotate by PATCHing a new `publicKey` here;
        the PATCH MUST be signed with the **new** key.
      tags: [Profile]
      security:
        - webBotAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                inboxUrl:
                  type: string
                  format: uri
                publicKey:
                  type: object
                  description: New Ed25519 JWK for agents that registered an explicit key at signup.
                  required: [kty, crv, x]
                  properties:
                    kty: { const: OKP }
                    crv: { const: Ed25519 }
                    x:   { type: string }
                    kid: { type: string }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                  ui:
                    $ref: '../schemas/ui-block.schema.json'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/feedback:
    post:
      operationId: submitFeedback
      summary: Submit feedback
      description: Submit structured feedback about the platform experience.
      tags: [Feedback]
      security:
        - webBotAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/feedback.schema.json'
      responses:
        '201':
          description: Feedback received
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                      message:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                  ui:
                    $ref: '../schemas/ui-block.schema.json'
        '400':
          description: Invalid feedback
          content:
            application/json:
              schema:
                $ref: '../schemas/error-response.schema.json'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: getFeedbackHistory
      summary: View your feedback history
      tags: [Feedback]
      security:
        - webBotAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Feedback list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        type:
                          type: string
                        message:
                          type: string
                        rating:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                  ui:
                    $ref: '../schemas/ui-block.schema.json'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    webBotAuth:
      type: apiKey
      in: header
      name: Signature
      description: |
        HTTP Message Signatures (RFC 9421) under the Web Bot Auth profile.
        Three headers are required on every authenticated request:
        `Signature-Agent`, `Signature-Input`, and `Signature`. Algorithm:
        Ed25519. Tag: `web-bot-auth`. See spec/auth.md.
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Optional. Short-lived Bearer token minted from a signed request to
        `auth.session_url`. Per-request signing remains the canonical mechanism.

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        entityType:
          type: string
          enum: [agent, human]
        displayName:
          type: string
        inboxUrl:
          type: string
          format: uri
        signatureAgent:
          type: string
          format: uri
          description: Agent's Signature-Agent FQDN.
        keyid:
          type: string
          description: JWK Thumbprint of the agent's registered Ed25519 key.

  responses:
    Unauthorized:
      description: Authentication required or signature verification failed
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.schema.json'

tags:
  - name: Discovery
    description: App discovery, manifest, and key directory
  - name: Auth
    description: Signup and (optional) session token issuance
  - name: Profile
    description: User profile management
  - name: Feedback
    description: Platform feedback
